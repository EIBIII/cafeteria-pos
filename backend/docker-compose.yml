services:
  postgres:
    image: postgres:16-alpine
    container_name: cafeteria_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-cafeteria}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cafeteria_secret}
      POSTGRES_DB: ${DB_NAME:-cafeteria_pos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cafeteria}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafeteria_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-cafeteria}:${DB_PASSWORD:-cafeteria_secret}@postgres:5432/${DB_NAME:-cafeteria_pos}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      PORT: 4000
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Cafeteria TecNM <no-reply@cafeteria.mx>}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "4000:4000"
    volumes:
      - ./src:/app/src

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cafeteria_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cafeteria.mx
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    profiles:
      - tools

volumes:
  postgres_data:
